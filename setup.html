<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingoo! — Setup Grid</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="sound-toggle" id="sound-toggle" onclick="toggleMute()" title="Toggle Sound">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" id="sound-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M12 18.75V5.25L7.75 9.5H4.5v5h3.25L12 18.75z" />
        </svg>
    </div>

    <div class="container">
        <header>
            <h1 onclick="window.location.href='index.html'" style="cursor:pointer;">Bingoo!</h1>
            <div id="room-header-info" style="font-size: 0.75rem; color: var(--secondary); font-weight: 700; font-family: 'Orbitron';">Setup</div>
        </header>

        <section class="screen" id="screen-room">
            <div class="game-layout">
                <!-- Players List Status Sidebar -->
                <div class="side-col glass-panel" style="flex: 0 0 220px;">
                    <div class="panel-header">Players Setup</div>
                    <div class="players-list" id="room-players-list">
                        <!-- Populated by JS -->
                    </div>
                    <div class="status-message neutral" id="lobby-status-msg" style="font-size: 0.65rem; margin-top: auto;"></div>
                </div>

                <!-- Center setup board columns -->
                <div class="center-col">
                    <div class="glass-panel" style="width: 100%; height: 100%; justify-content: center; align-items: center;">
                        <div class="subtitle" style="margin-bottom: 4px;">Fill board with numbers 1 to 25.</div>
                        
                        <div class="grid" id="setup-grid">
                            <!-- JS generates 25 inputs -->
                        </div>
                        
                        <div class="status-row" style="margin-top: 4px;">
                            <span id="board-status">0 / 25 filled</span>
                        </div>
                        
                        <div class="controls-row">
                            <button class="action-btn secondary" id="clear-btn" onclick="clearBoard()">Clear</button>
                            <button class="action-btn secondary" id="rand-btn" onclick="randomizeBoard()">Shuffle</button>
                        </div>
                        
                        <button class="action-btn primary" id="setup-action-btn" onclick="handleReadyAction()" disabled style="width: 100%; max-width: 320px; margin-top: 4px;">
                            Mark Ready
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Web Audio API Sound Logic -->
    <script>
        let audioMuted = false;
        let audioCtx = null;

        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function toggleMute() {
            audioMuted = !audioMuted;
            const soundIcon = document.getElementById('sound-icon');
            if (audioMuted) {
                soundIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M17.25 9.75L19.5 12m0 0l2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25m-10.5-6L4.5 9.5H1.5v5h3l4.5 3.75V5.25z" />`;
                document.getElementById('sound-toggle').style.color = 'var(--danger)';
            } else {
                soundIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M12 18.75V5.25L7.75 9.5H4.5v5h3.25L12 18.75z" stroke-width="2" />`;
                document.getElementById('sound-toggle').style.color = 'var(--text-muted)';
            }
        }

        function playSynthSound(freqs, durations, type = 'sine') {
            if (audioMuted) return;
            try {
                const ctx = getAudioContext();
                let time = ctx.currentTime;
                freqs.forEach((freq, idx) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, time);
                    gain.gain.setValueAtTime(0.1, time);
                    gain.gain.exponentialRampToValueAtTime(0.0001, time + durations[idx]);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(time);
                    osc.stop(time + durations[idx]);
                    time += durations[idx] * 0.75;
                });
            } catch (e) {
                console.log(e);
            }
        }
    </script>

    <!-- Synced Setup Script -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQY2q5-6y1y90-MwKaMAXG8Tg6fFs2zoY",
            authDomain: "bingo-game-47a41.firebaseapp.com",
            databaseURL: "https://bingo-game-47a41-default-rtdb.firebaseio.com",
            projectId: "bingo-game-47a41",
            storageBucket: "bingo-game-47a41.firebasestorage.app",
            messagingSenderId: "367273433063",
            appId: "1:367273433063:web:7b95c28334524d06f6cf42",
            measurementId: "G-V0G09M75SB"
        };

        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
        }

        const myName = sessionStorage.getItem('bingo_myName') || 'Player';
        const myUserId = sessionStorage.getItem('bingo_myUserId');
        const roomId = sessionStorage.getItem('bingo_roomId');
        
        let isHost = sessionStorage.getItem('bingo_isHost') === 'true';
        let roomRef = null;
        let playersRef = null;
        
        let boardValues = new Array(25).fill(null);
        let lobbyPlayers = [];
        let playersReady = {};

        function initSetup() {
            if (!roomId || !myUserId) {
                window.location.href = 'index.html';
                return;
            }

            roomRef = firebase.database().ref('rooms/' + roomId);
            playersRef = roomRef.child('players');

            // Force ready = false in Firebase during setup initiation
            playersRef.child(myUserId).child('ready').set(false);

            // Listen room state
            roomRef.on('value', snapshot => {
                const data = snapshot.val();
                if (!data) return;

                isHost = (data.meta.host === myUserId);
                sessionStorage.setItem('bingo_isHost', isHost ? 'true' : 'false');

                // Header status
                document.getElementById('room-header-info').innerText = `${data.meta.code} (Setup)`;

                // Update players panel list
                const listEl = document.getElementById('room-players-list');
                listEl.innerHTML = '';
                const players = data.players || {};
                lobbyPlayers = Object.keys(players);
                
                let allClientsReady = true;
                let clientCount = 0;

                lobbyPlayers.forEach(key => {
                    const p = players[key];
                    playersReady[p.name] = p.ready;

                    const item = document.createElement('div');
                    item.className = 'player-item' + (key === data.meta.host ? ' host' : '');
                    
                    const isSelf = (key === myUserId);
                    const tag = p.ready ? 'Ready' : 'Setup';
                    const tagClass = p.ready ? 'ready' : 'waiting';

                    if (key !== data.meta.host) {
                        clientCount++;
                        if (!p.ready) allClientsReady = false;
                    }

                    let teamLabel = '';
                    if (data.meta.teamMode) {
                        teamLabel = `<span class="player-badge team-${p.team}">${p.team === 'red' ? 'RED' : 'BLUE'}</span>`;
                    }

                    item.innerHTML = `
                        <div class="player-meta">
                            <span class="player-avatar" style="border: 2px solid ${p.color};">${p.avatar}</span>
                            <span class="player-name" style="${isSelf ? 'font-weight: 800;' : ''}">${p.name}</span>
                            ${teamLabel}
                        </div>
                        <span class="lobby-player-status ${tagClass}">${tag}</span>
                    `;
                    listEl.appendChild(item);
                });

                // Lobby host controllers
                const setupActionBtn = document.getElementById('setup-action-btn');
                const lobbyStatusMsg = document.getElementById('lobby-status-msg');

                if (data.meta.status === 'playing') {
                    // Redirect to Gameplay page!
                    window.location.href = 'game.html';
                }

                if (isHost) {
                    const hostBoardValid = validateBoardFormatLocal();
                    const canStart = hostBoardValid && allClientsReady && clientCount > 0;
                    setupActionBtn.disabled = !canStart;
                    setupActionBtn.innerText = "Start Game";

                    if (!hostBoardValid) {
                        lobbyStatusMsg.innerText = "Complete your grid.";
                    } else if (clientCount === 0) {
                        lobbyStatusMsg.innerText = "Waiting for players...";
                    } else if (!allClientsReady) {
                        lobbyStatusMsg.innerText = "Waiting for players to get ready...";
                    } else {
                        lobbyStatusMsg.innerText = "All players ready! Launch match.";
                    }
                } else {
                    // Client view ready feedback
                    playersRef.child(myUserId).once('value', pSnap => {
                        const self = pSnap.val();
                        if (self) {
                            setupActionBtn.innerText = self.ready ? "Ready! (Cancel)" : "Mark Ready";
                            if (self.ready) {
                                setupActionBtn.classList.add('secondary');
                                setupActionBtn.classList.remove('primary');
                            } else {
                                setupActionBtn.classList.add('primary');
                                setupActionBtn.classList.remove('secondary');
                            }
                        }
                    });
                    lobbyStatusMsg.innerText = "Wait for Host to start game.";
                }
            });

            // Generate initial inputs
            buildSetupInputs();
        }

        function buildSetupInputs() {
            const gridEl = document.getElementById('setup-grid');
            gridEl.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.inputMode = 'numeric';
                input.pattern = '[0-9]*';
                input.className = 'cell';
                input.maxLength = 2;
                input.id = `cell-input-${i}`;
                input.dataset.index = i;
                
                input.addEventListener('keydown', handleKeyNavigation);
                input.addEventListener('input', handleCellInput);
                input.addEventListener('blur', handleCellBlur);
                
                gridEl.appendChild(input);
            }
            updateValidation();
        }

        function toggleSetupInputs(disabled) {
            for (let i = 0; i < 25; i++) {
                const input = document.getElementById(`cell-input-${i}`);
                if (input) input.disabled = disabled;
            }
            document.getElementById('clear-btn').disabled = disabled;
            document.getElementById('rand-btn').disabled = disabled;
        }

        function handleCellInput(e) {
            const input = e.target;
            const idx = parseInt(input.dataset.index);
            
            let valStr = input.value.replace(/\D/g, '');
            input.value = valStr;
            
            if (valStr !== '') {
                const num = parseInt(valStr);
                if ((num >= 3 && num <= 9 && valStr.length === 1) || valStr.length === 2) {
                    autoAdvance(idx);
                }
            }
            updateValidation();
        }

        function autoAdvance(currentIndex) {
            for (let i = currentIndex + 1; i < 25; i++) {
                const nextInput = document.getElementById(`cell-input-${i}`);
                if (nextInput && nextInput.value === '') {
                    nextInput.focus();
                    nextInput.select();
                    return;
                }
            }
            for (let i = 0; i < currentIndex; i++) {
                const prevInput = document.getElementById(`cell-input-${i}`);
                if (prevInput && prevInput.value === '') {
                    prevInput.focus();
                    prevInput.select();
                    return;
                }
            }
        }

        function handleCellBlur(e) {
            const input = e.target;
            let valStr = input.value.trim();
            if (valStr !== '') {
                const valInt = parseInt(valStr);
                if (valInt >= 1 && valInt <= 25) {
                    input.value = valInt;
                }
            }
            updateValidation();
        }

        function handleKeyNavigation(e) {
            const idx = parseInt(e.target.dataset.index);
            switch (e.key) {
                case 'Backspace':
                    if (e.target.value === '' && idx > 0) {
                        const prev = document.getElementById(`cell-input-${idx - 1}`);
                        if (prev) {
                            prev.focus();
                            prev.value = '';
                            e.preventDefault();
                            updateValidation();
                        }
                    }
                    break;
                case 'ArrowLeft':
                    if (idx % 5 > 0) focusCell(idx - 1);
                    break;
                case 'ArrowRight':
                    if (idx % 5 < 4) focusCell(idx + 1);
                    break;
                case 'ArrowUp':
                    if (idx >= 5) focusCell(idx - 5);
                    break;
                case 'ArrowDown':
                    if (idx < 20) focusCell(idx + 5);
                    break;
                case 'Enter':
                    autoAdvance(idx);
                    e.preventDefault();
                    break;
            }
        }

        function focusCell(idx) {
            const el = document.getElementById(`cell-input-${idx}`);
            if (el) {
                el.focus();
                el.select();
            }
        }

        function clearBoard() {
            for (let i = 0; i < 25; i++) {
                const input = document.getElementById(`cell-input-${i}`);
                if (input) input.value = '';
            }
            updateValidation();
            focusCell(0);
        }

        function randomizeBoard() {
            let nums = Array.from({length: 25}, (_, i) => i + 1);
            for (let i = nums.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [nums[i], nums[j]] = [nums[j], nums[i]];
            }
            for (let i = 0; i < 25; i++) {
                const input = document.getElementById(`cell-input-${i}`);
                if (input) {
                    input.value = nums[i];
                    input.classList.remove('error');
                }
            }
            updateValidation();
            playSynthSound([300, 400, 500], [0.08, 0.08, 0.12], 'sine');
        }

        function updateValidation() {
            let counts = new Array(26).fill(0);
            let currentValues = new Array(25).fill(null);

            for (let i = 0; i < 25; i++) {
                const input = document.getElementById(`cell-input-${i}`);
                if (!input) continue;

                let rawVal = input.value.trim();
                input.classList.remove('error');

                if (rawVal !== '') {
                    let val = parseInt(rawVal);
                    if (isNaN(val) || val < 1 || val > 25) {
                        input.classList.add('error');
                    } else {
                        currentValues[i] = val;
                        counts[val]++;
                    }
                }
            }

            for (let i = 0; i < 25; i++) {
                let val = currentValues[i];
                if (val !== null && counts[val] > 1) {
                    const input = document.getElementById(`cell-input-${i}`);
                    if (input) input.classList.add('error');
                }
            }

            boardValues = currentValues;

            let filledCount = 0;
            for (let i = 0; i < 25; i++) {
                if (currentValues[i] !== null) filledCount++;
            }

            const hasDuplicates = counts.some(c => c > 1);
            const allFilled = currentValues.every(v => v !== null);
            const hasErrors = Array.from(document.getElementById('setup-grid').querySelectorAll('.error')).length > 0;

            const boardValid = allFilled && !hasDuplicates && !hasErrors;

            const setupActionBtn = document.getElementById('setup-action-btn');
            if (!isHost) {
                setupActionBtn.disabled = !boardValid;
            }

            const boardStatusEl = document.getElementById('board-status');
            if (boardValid) {
                boardStatusEl.innerHTML = `<span style="color: var(--success); font-weight:700;">Board Ready! ✓</span>`;
            } else {
                if (hasDuplicates) {
                    boardStatusEl.innerHTML = `<span style="color: var(--danger); font-weight:700;">Duplicate numbers found</span>`;
                } else if (hasErrors) {
                    boardStatusEl.innerHTML = `<span style="color: var(--danger); font-weight:700;">Invalid values (must be 1-25)</span>`;
                } else {
                    boardStatusEl.innerHTML = `<span style="color: var(--text-muted);">${filledCount} / 25 entered</span>`;
                }
            }
        }

        function validateBoardFormatLocal() {
            let counts = new Array(26).fill(0);
            let currentValues = new Array(25).fill(null);
            for (let i = 0; i < 25; i++) {
                const input = document.getElementById(`cell-input-${i}`);
                if (input && input.value !== '') {
                    let val = parseInt(input.value.trim());
                    if (!isNaN(val) && val >= 1 && val <= 25) {
                        currentValues[i] = val;
                        counts[val]++;
                    }
                }
            }
            return currentValues.every(v => v !== null) && !counts.some(c => c > 1);
        }

        function handleReadyAction() {
            if (isHost) {
                // Host starts the game
                roomRef.child('meta/status').set('playing');
                roomRef.child('chat').push({
                    text: "Game started! Call numbers to strike them.",
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            } else {
                // Client toggles ready state
                playersRef.child(myUserId).once('value', snapshot => {
                    const p = snapshot.val();
                    if (!p) return;
                    const nextReady = !p.ready;
                    
                    playersRef.child(myUserId).child('ready').set(nextReady);
                    toggleSetupInputs(nextReady);
                    
                    // Save board values to sessionStorage for gameplay reload
                    sessionStorage.setItem('bingo_boardValues', JSON.stringify(boardValues));
                });
            }
        }

        // Host also saves board values on redirect
        window.onbeforeunload = function() {
            sessionStorage.setItem('bingo_boardValues', JSON.stringify(boardValues));
        };

        // Boot
        initSetup();
    </script>
</body>
</html>
