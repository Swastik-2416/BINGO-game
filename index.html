<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingoo! — Welcome</title>
    <!-- CSS stylesheet link -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="container" style="justify-content: center; height: auto; min-height: 100vh;">
        <header style="justify-content: center; margin-bottom: 0.5rem;">
            <h1>Bingoo!</h1>
        </header>

        <section class="screen" id="screen-landing" style="flex-grow: 0;">
            <div class="landing-card">
                <div class="caller-panel" style="background: transparent; border: none; padding: 0;">
                    <div class="avatar-label">Choose Avatar Emoji</div>
                    <div class="avatar-selector" id="avatar-selector">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="caller-panel" style="background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.08); padding: 0.5rem;">
                    <div class="avatar-label">Your Nickname</div>
                    <input type="text" class="caller-input" id="nickname-input" placeholder="Nickname" maxlength="12" value="Player" style="height: 32px; font-size: 0.85rem;">
                </div>

                <div class="controls-row">
                    <button class="action-btn primary" onclick="quickMatchmake()">Play Online</button>
                </div>
                <div class="controls-row">
                    <button class="action-btn secondary" onclick="createRoomMenu()">Host Private</button>
                    <button class="action-btn secondary" onclick="showJoinRoomMenu()">Join Private</button>
                </div>

                <!-- Host Menu Option Panel -->
                <div class="caller-panel hidden" id="host-options-panel">
                    <div class="avatar-label">Room Mode Options</div>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.75rem; cursor: pointer;">
                        <input type="checkbox" id="teams-toggle"> Enable Team Mode (🔴 vs 🔵)
                    </label>
                    <button class="action-btn primary" style="padding: 0.4rem; font-size: 0.75rem;" onclick="hostPrivateRoom()">Confirm & Create</button>
                </div>

                <!-- Join Menu Option Panel -->
                <div class="caller-panel hidden" id="join-options-panel">
                    <div class="avatar-label">Enter Room Code</div>
                    <div class="caller-row">
                        <input type="text" class="caller-input" id="room-code-input" placeholder="e.g. WXYZAB" style="text-transform: uppercase; height: 30px;">
                        <button class="action-btn primary" style="height: 30px; font-size: 0.75rem;" onclick="joinPrivateRoom()">Join</button>
                    </div>
                </div>

                <!-- Active Public Rooms Browser -->
                <div class="avatar-label">Active Public Rooms</div>
                <div class="rooms-directory" id="rooms-directory">
                    <div style="font-size: 0.7rem; color: var(--text-muted); text-align: center; padding: 1rem 0;">Scanning public servers...</div>
                </div>
            </div>
        </section>
    </div>

    <!-- Script Block -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQY2q5-6y1y90-MwKaMAXG8Tg6fFs2zoY",
            authDomain: "bingo-game-47a41.firebaseapp.com",
            databaseURL: "https://bingo-game-47a41-default-rtdb.firebaseio.com",
            projectId: "bingo-game-47a41",
            storageBucket: "bingo-game-47a41.firebasestorage.app",
            messagingSenderId: "367273433063",
            appId: "1:367273433063:web:7b95c28334524d06f6cf42",
            measurementId: "G-V0G09M75SB"
        };

        // Initialize Firebase
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
        }

        const emojis = ['🦊','🐯','🐼','🐨','🐙','🦄','🦖','🦁','🐵','🐔','🐸','🐮','🐷','🐹'];
        let selectedAvatar = emojis[0];
        let myUserId = null;
        let myColor = '#6366f1';

        function initLanding() {
            // Render emojis
            const selector = document.getElementById('avatar-selector');
            selector.innerHTML = '';
            emojis.forEach((emoji, idx) => {
                const opt = document.createElement('div');
                opt.className = 'avatar-option' + (idx === 0 ? ' selected' : '');
                opt.innerText = emoji;
                opt.onclick = () => {
                    document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedAvatar = emoji;
                };
                selector.appendChild(opt);
            });

            // Random color
            const colors = ['#6366f1','#d946ef','#10b981','#f59e0b','#ef4444','#3b82f6','#a78bfa'];
            myColor = colors[Math.floor(Math.random() * colors.length)];

            if (typeof firebase !== 'undefined') {
                firebase.auth().signInAnonymously().then(cred => {
                    myUserId = cred.user.uid;
                    listenToPublicRooms();
                    
                    // URL Room auto-triggering check
                    const params = new URLSearchParams(window.location.search);
                    const roomCode = params.get('room');
                    if (roomCode) {
                        document.getElementById('nickname-input').value = "Player_" + Math.floor(100 + Math.random() * 900);
                        setTimeout(() => {
                            showJoinRoomMenu();
                            document.getElementById('room-code-input').value = roomCode;
                            joinPrivateRoom();
                        }, 500);
                    }
                }).catch(err => {
                    console.error("Firebase Auth failed: ", err);
                });
            }
        }

        let publicRoomsQuery = null;
        function listenToPublicRooms() {
            if (typeof firebase === 'undefined') return;
            const db = firebase.database();
            
            publicRoomsQuery = db.ref('rooms').orderByChild('meta/isPublic').equalTo(true);
            publicRoomsQuery.on('value', snapshot => {
                const dir = document.getElementById('rooms-directory');
                dir.innerHTML = '';
                const rooms = snapshot.val();
                
                if (!rooms) {
                    dir.innerHTML = `<div style="font-size: 0.7rem; color: var(--text-muted); text-align: center; padding: 1.5rem 0;">No active public lobbies. Host one!</div>`;
                    return;
                }
                
                let foundOpen = false;
                for (let key in rooms) {
                    const room = rooms[key];
                    if (room.meta.status === 'lobby') {
                        const count = room.players ? Object.keys(room.players).length : 0;
                        if (count < (room.meta.maxPlayers || 8)) {
                            foundOpen = true;
                            const row = document.createElement('div');
                            row.className = 'room-row';
                            row.innerHTML = `
                                <div><strong>${room.meta.name}</strong> (${count}/8)</div>
                                <button class="action-btn primary" style="padding: 2px 6px; font-size: 0.65rem;" onclick="joinSelectedRoom('${key}')">Join</button>
                            `;
                            dir.appendChild(row);
                        }
                    }
                }
                if (!foundOpen) {
                    dir.innerHTML = `<div style="font-size: 0.7rem; color: var(--text-muted); text-align: center; padding: 1.5rem 0;">No active public lobbies. Host one!</div>`;
                }
            });
        }

        function createRoomCode() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890';
            let res = '';
            for (let i = 0; i < 6; i++) {
                res += letters.charAt(Math.floor(Math.random() * letters.length));
            }
            return res;
        }

        function createRoomMenu() {
            document.getElementById('join-options-panel').classList.add('hidden');
            document.getElementById('host-options-panel').classList.remove('hidden');
        }

        function showJoinRoomMenu() {
            document.getElementById('host-options-panel').classList.add('hidden');
            document.getElementById('join-options-panel').classList.remove('hidden');
        }

        function saveProfile(name) {
            sessionStorage.setItem('bingo_myName', name);
            sessionStorage.setItem('bingo_myAvatar', selectedAvatar);
            sessionStorage.setItem('bingo_myColor', myColor);
            sessionStorage.setItem('bingo_myUserId', myUserId);
        }

        function hostPrivateRoom() {
            const name = document.getElementById('nickname-input').value.trim() || 'Host';
            const teams = document.getElementById('teams-toggle').checked;
            saveProfile(name);
            setupAndLaunchRoom(name, false, teams);
        }

        function quickMatchmake() {
            const name = document.getElementById('nickname-input').value.trim() || 'Player';
            saveProfile(name);
            
            firebase.database().ref('rooms').once('value', snapshot => {
                const rooms = snapshot.val();
                let joinedId = null;
                if (rooms) {
                    for (let key in rooms) {
                        const r = rooms[key];
                        if (r.meta.isPublic && r.meta.status === 'lobby') {
                            const count = r.players ? Object.keys(r.players).length : 0;
                            if (count < 8) {
                                joinedId = key;
                                break;
                            }
                        }
                    }
                }

                if (joinedId) {
                    joinSelectedRoom(joinedId, name);
                } else {
                    setupAndLaunchRoom(name, true, false);
                }
            });
        }

        function joinSelectedRoom(roomId, overrideName) {
            const name = overrideName || document.getElementById('nickname-input').value.trim() || 'Player';
            saveProfile(name);
            
            sessionStorage.setItem('bingo_roomId', roomId);
            sessionStorage.setItem('bingo_isHost', 'false');
            sessionStorage.setItem('bingo_offline', 'false');
            
            window.location.href = 'lobby.html';
        }

        function joinPrivateRoom() {
            const code = document.getElementById('room-code-input').value.trim().toUpperCase();
            const name = document.getElementById('nickname-input').value.trim() || 'Player';
            
            if (!code) {
                alert("Please enter a room code!");
                return;
            }

            saveProfile(name);

            firebase.database().ref('rooms').once('value', snapshot => {
                const rooms = snapshot.val();
                let foundRoomKey = null;
                if (rooms) {
                    for (let key in rooms) {
                        if (rooms[key].meta.code === code) {
                            foundRoomKey = key;
                            break;
                        }
                    }
                }

                if (foundRoomKey) {
                    joinSelectedRoom(foundRoomKey, name);
                } else {
                    alert("Room not found! Verify room code.");
                }
            });
        }

        function setupAndLaunchRoom(hostName, isPublic, teamMode) {
            if (typeof firebase === 'undefined') return;
            const db = firebase.database();
            
            const code = createRoomCode();
            const roomId = db.ref('rooms').push().key;
            
            const roomData = {
                meta: {
                    code: code,
                    host: myUserId,
                    name: `${hostName}'s Lobby`,
                    status: 'lobby',
                    isPublic: isPublic,
                    maxPlayers: 8,
                    teamMode: teamMode,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                }
            };

            db.ref('rooms/' + roomId).set(roomData).then(() => {
                sessionStorage.setItem('bingo_roomId', roomId);
                sessionStorage.setItem('bingo_isHost', 'true');
                sessionStorage.setItem('bingo_offline', 'false');
                window.location.href = 'lobby.html';
            });
        }

        // Boot
        initLanding();
    </script>
</body>
</html>
