<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingoo! — Welcome</title>
    <link rel="stylesheet" href="style.css">

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* Spinner for loading state */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container" style="justify-content: center; height: auto; min-height: 100vh;">
        <header style="justify-content: center; margin-bottom: 0.5rem;">
            <h1>Bingoo!</h1>
        </header>

        <section class="screen" id="screen-landing" style="flex-grow: 0;">
            <div class="landing-card">

                <!-- Avatar Picker -->
                <div style="display:flex; flex-direction:column; gap:6px;">
                    <div class="avatar-label">Choose Avatar</div>
                    <div class="avatar-selector" id="avatar-selector"></div>
                </div>

                <!-- Nickname -->
                <div style="display:flex; flex-direction:column; gap:6px;">
                    <div class="avatar-label">Nickname</div>
                    <input type="text" class="caller-input" id="nickname-input"
                           placeholder="Enter your nickname" maxlength="12" value="Player"
                           style="height: 36px; font-size: 0.9rem;">
                </div>

                <!-- Main Action Buttons -->
                <button class="action-btn primary" id="btn-play-online"
                        style="width:100%; height:42px; font-size:0.9rem;"
                        onclick="quickMatchmake()" disabled>
                    <span class="spinner"></span> Connecting…
                </button>

                <div class="controls-row">
                    <button class="action-btn secondary" id="btn-host"
                            style="flex:1; height:38px;" onclick="createRoomMenu()" disabled>
                        Host Private
                    </button>
                    <button class="action-btn secondary" id="btn-join"
                            style="flex:1; height:38px;" onclick="showJoinRoomMenu()" disabled>
                        Join Private
                    </button>
                </div>

                <!-- Host Options (initially hidden) -->
                <div class="caller-panel hidden" id="host-options-panel">
                    <div class="avatar-label">Room Options</div>
                    <label style="display:flex; align-items:center; gap:8px; font-size:0.8rem; cursor:pointer;">
                        <input type="checkbox" id="teams-toggle">
                        Enable Team Mode (🔴 vs 🔵)
                    </label>
                    <button class="action-btn primary" style="font-size:0.8rem;" onclick="hostPrivateRoom()">
                        Confirm & Create Room
                    </button>
                </div>

                <!-- Join Options (initially hidden) -->
                <div class="caller-panel hidden" id="join-options-panel">
                    <div class="avatar-label">Enter Room Code</div>
                    <div class="caller-row">
                        <input type="text" class="caller-input" id="room-code-input"
                               placeholder="e.g. WXYZAB" maxlength="6"
                               style="text-transform:uppercase; height:36px;">
                        <button class="action-btn primary" style="width:70px; height:36px;"
                                onclick="joinPrivateRoom()">Join</button>
                    </div>
                </div>

                <!-- Public Rooms Browser -->
                <div>
                    <div class="avatar-label" style="margin-bottom:4px;">Active Public Rooms</div>
                    <div class="rooms-directory" id="rooms-directory">
                        <div style="font-size:0.7rem; color:var(--text-muted); text-align:center; padding:1.2rem 0;">
                            <span class="spinner"></span> Scanning servers…
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </div>

    <script>
        // ─── Firebase setup ───────────────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyDQY2q5-6y1y90-MwKaMAXG8Tg6fFs2zoY",
            authDomain: "bingo-game-47a41.firebaseapp.com",
            databaseURL: "https://bingo-game-47a41-default-rtdb.firebaseio.com",
            projectId: "bingo-game-47a41",
            storageBucket: "bingo-game-47a41.firebasestorage.app",
            messagingSenderId: "367273433063",
            appId: "1:367273433063:web:7b95c28334524d06f6cf42",
            measurementId: "G-V0G09M75SB"
        };
        firebase.initializeApp(firebaseConfig);

        // ─── State ────────────────────────────────────────────────────────────────
        const emojis = ['🦊','🐯','🐼','🐨','🐙','🦄','🦖','🦁','🐵','🐔','🐸','🐮','🐷','🐹'];
        let selectedAvatar = emojis[0];
        let myUserId = null;     // set after anonymous auth completes
        let myColor = '#6366f1';
        const colors = ['#6366f1','#d946ef','#10b981','#f59e0b','#ef4444','#3b82f6','#a78bfa'];

        // ─── UI helpers ──────────────────────────────────────────────────────────
        function enableButtons() {
            document.getElementById('btn-play-online').innerHTML = '▶ Play Online';
            document.getElementById('btn-play-online').disabled = false;
            document.getElementById('btn-host').disabled = false;
            document.getElementById('btn-join').disabled = false;
        }

        function createRoomMenu() {
            document.getElementById('join-options-panel').classList.add('hidden');
            document.getElementById('host-options-panel').classList.remove('hidden');
        }

        function showJoinRoomMenu() {
            document.getElementById('host-options-panel').classList.add('hidden');
            document.getElementById('join-options-panel').classList.remove('hidden');
        }

        function saveProfile(name) {
            sessionStorage.setItem('bingo_myName', name);
            sessionStorage.setItem('bingo_myAvatar', selectedAvatar);
            sessionStorage.setItem('bingo_myColor', myColor);
            sessionStorage.setItem('bingo_myUserId', myUserId);
        }

        // ─── Room code generator ─────────────────────────────────────────────────
        function createRoomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        // ─── Matchmaking ──────────────────────────────────────────────────────────
        function quickMatchmake() {
            if (!myUserId) { alert('Still connecting — please wait a moment!'); return; }
            const name = document.getElementById('nickname-input').value.trim() || 'Player';
            saveProfile(name);

            firebase.database().ref('rooms').once('value', snapshot => {
                const rooms = snapshot.val();
                let openRoomId = null;
                if (rooms) {
                    for (const key in rooms) {
                        const r = rooms[key];
                        if (r.meta.isPublic && r.meta.status === 'lobby') {
                            const count = r.players ? Object.keys(r.players).length : 0;
                            if (count < 8) { openRoomId = key; break; }
                        }
                    }
                }
                if (openRoomId) {
                    goToLobby(openRoomId, false);
                } else {
                    createAndGoToRoom(name, true, false);
                }
            });
        }

        function hostPrivateRoom() {
            if (!myUserId) { alert('Still connecting — please wait a moment!'); return; }
            const name = document.getElementById('nickname-input').value.trim() || 'Host';
            const teams = document.getElementById('teams-toggle').checked;
            saveProfile(name);
            createAndGoToRoom(name, false, teams);
        }

        function joinPrivateRoom() {
            if (!myUserId) { alert('Still connecting — please wait a moment!'); return; }
            const code = document.getElementById('room-code-input').value.trim().toUpperCase();
            const name = document.getElementById('nickname-input').value.trim() || 'Player';
            if (!code) { alert('Please enter a room code!'); return; }
            saveProfile(name);

            firebase.database().ref('rooms').once('value', snapshot => {
                const rooms = snapshot.val();
                let found = null;
                if (rooms) {
                    for (const key in rooms) {
                        if (rooms[key].meta && rooms[key].meta.code === code) { found = key; break; }
                    }
                }
                if (found) {
                    goToLobby(found, false);
                } else {
                    alert('Room not found! Check the code and try again.');
                }
            });
        }

        function joinSelectedRoom(roomId) {
            if (!myUserId) { alert('Still connecting — please wait a moment!'); return; }
            const name = document.getElementById('nickname-input').value.trim() || 'Player';
            saveProfile(name);
            goToLobby(roomId, false);
        }

        function createAndGoToRoom(hostName, isPublic, teamMode) {
            const db = firebase.database();
            const code = createRoomCode();
            const roomId = db.ref('rooms').push().key;

            db.ref('rooms/' + roomId).set({
                meta: {
                    code,
                    host: myUserId,
                    name: `${hostName}'s Lobby`,
                    status: 'lobby',
                    isPublic,
                    maxPlayers: 8,
                    teamMode,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                }
            }).then(() => goToLobby(roomId, true));
        }

        function goToLobby(roomId, isHost) {
            sessionStorage.setItem('bingo_roomId', roomId);
            sessionStorage.setItem('bingo_isHost', isHost ? 'true' : 'false');
            window.location.href = 'lobby.html';
        }

        // ─── Public rooms live browser ────────────────────────────────────────────
        function listenToPublicRooms() {
            firebase.database()
                .ref('rooms')
                .orderByChild('meta/isPublic')
                .equalTo(true)
                .on('value', snapshot => {
                    const dir = document.getElementById('rooms-directory');
                    dir.innerHTML = '';
                    const rooms = snapshot.val();
                    let found = false;

                    if (rooms) {
                        for (const key in rooms) {
                            const r = rooms[key];
                            if (r.meta.status === 'lobby') {
                                const count = r.players ? Object.keys(r.players).length : 0;
                                if (count < 8) {
                                    found = true;
                                    const row = document.createElement('div');
                                    row.className = 'room-row';
                                    row.innerHTML = `
                                        <div>
                                            <strong>${r.meta.name}</strong>
                                            <span style="color:var(--text-muted); font-size:0.65rem;"> · ${count}/8 players</span>
                                        </div>
                                        <button class="action-btn primary"
                                                style="padding:2px 8px; font-size:0.65rem;"
                                                onclick="joinSelectedRoom('${key}')">Join</button>
                                    `;
                                    dir.appendChild(row);
                                }
                            }
                        }
                    }

                    if (!found) {
                        dir.innerHTML = `<div style="font-size:0.7rem; color:var(--text-muted); text-align:center; padding:1.2rem 0;">No open lobbies. Be the first to host!</div>`;
                    }
                });
        }

        // ─── Init ────────────────────────────────────────────────────────────────
        function initLanding() {
            // Build avatar grid
            const selector = document.getElementById('avatar-selector');
            emojis.forEach((emoji, idx) => {
                const opt = document.createElement('div');
                opt.className = 'avatar-option' + (idx === 0 ? ' selected' : '');
                opt.innerText = emoji;
                opt.onclick = () => {
                    document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedAvatar = emoji;
                };
                selector.appendChild(opt);
            });

            // Assign a random accent color
            myColor = colors[Math.floor(Math.random() * colors.length)];

            // ── Sign in anonymously, then unlock buttons ──────────────────────────
            firebase.auth().signInAnonymously()
                .then(cred => {
                    myUserId = cred.user.uid;
                    enableButtons();
                    listenToPublicRooms();

                    // Deep-link via ?room=CODE
                    const code = new URLSearchParams(window.location.search).get('room');
                    if (code) {
                        document.getElementById('nickname-input').value = 'Player_' + Math.floor(100 + Math.random() * 900);
                        showJoinRoomMenu();
                        document.getElementById('room-code-input').value = code;
                        setTimeout(joinPrivateRoom, 400);
                    }
                })
                .catch(err => {
                    console.error('Firebase Auth error:', err);
                    document.getElementById('btn-play-online').innerHTML = '⚠ Connection failed — reload';
                });
        }

        initLanding();
    </script>
</body>
</html>
